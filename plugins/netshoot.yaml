apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: netshoot
spec:
  version: v0.2.0
  homepage: https://github.com/nilic/kubectl-netshoot
  shortDescription: Spin up netshoot container for troubleshooting
  description: |
    Spin up a throwaway netshoot container for network troubleshooting and attach to
    it or run a one-time command. nicolaka/netshoot is a Swiss-army knife network
    troubleshooting container which allows you to perform Kubernetes troubleshooting
    without installing any new packages in your containers or cluster nodes.
  platforms:
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/nilic/kubectl-netshoot/releases/download/v0.2.0/kubectl-netshoot_v0.2.0_darwin_amd64.tar.gz
      sha256: c3870e93f8997ef2448f3a015897e29e2beea80191298b8725c869af88e576be
      bin: kubectl-netshoot
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/nilic/kubectl-netshoot/releases/download/v0.2.0/kubectl-netshoot_v0.2.0_darwin_arm64.tar.gz
      sha256: 6ed27c9c4f801f6b3ef737fbbe723656ccecf4fee1fb7ccac1973d45b35c98de
      bin: kubectl-netshoot
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/nilic/kubectl-netshoot/releases/download/v0.2.0/kubectl-netshoot_v0.2.0_linux_amd64.tar.gz
      sha256: 38b1a088db0f46e74d795d5045830840378b7aa048ea76000f023ad8a928f889
      bin: kubectl-netshoot
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/nilic/kubectl-netshoot/releases/download/v0.2.0/kubectl-netshoot_v0.2.0_linux_arm64.tar.gz
      sha256: 70771de34301f5fcb1489de745dd412715746cbb9c2590b6b522a31ae5b87958
      bin: kubectl-netshoot
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/nilic/kubectl-netshoot/releases/download/v0.2.0/kubectl-netshoot_v0.2.0_windows_amd64.zip
      sha256: 7eca599a50e6bdce8dfa48287b8ad112631726c2bb65f7b2e742541730dabf91
      bin: kubectl-netshoot.exe
